<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 22px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #4a90e2;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #357abd;
        }

        /* Mensagem de Erro e Sucesso */
        .mensagem {
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
        }

        .erro {
            color: red;
        }

        .sucesso {
            color: green;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .forca-senha {
            height: 6px;
            border-radius: 3px;
            margin-bottom: 15px;
            margin-top: -10px;
            background-color: #eee;
        }

        .forca-barra {
            height: 100%;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }

        .passo {
            display: none;
        }

        .passo.ativo {
            display: block;
        }

        .voltar {
            background-color: transparent;
            color: #4a90e2;
            border: 1px solid #4a90e2;
            margin-top: 8px;
        }

        .voltar:hover {
            background-color: #eaf2ff;
        }

        #texto-passo {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Redefinir Senha</h2>
    <p id="texto-passo">Passo 1 de 3 — Informe seu e-mail</p>

    <div class="passo ativo" id="passo1">
        <label for="email">E-mail cadastrado:</label>
        <input type="email" id="email" placeholder="seuemail@email.com">
        <span class="mensagem erro" id="erroEmail">Por favor informe um e-mail válido.</span>
        <button onclick="verificarEmail()">Enviar código</button>
    </div>

    <div class="passo" id="passo2">
        <label for="codigo">Código de verificação:</label>
        <input type="text" id="codigo" placeholder="Digite o código recebido" maxlength="6">
        <span class="mensagem erro" id="erroCodigo">Código incorreto. Tente novamente.</span>
        <button onclick="verificarCodigo()">Verificar código</button>
        <button class="voltar" onclick="voltarPasso(1)">Voltar</button>
    </div>

    <div class="passo" id="passo3">
        <label for="novaSenha">Nova senha:</label>
        <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" oninput="verificarForca()">

        <div class="forca-senha">
            <div class="forca-barra" id="forcaBarra"></div>
        </div>

        <label for="confirmarSenha">Confirmar senha:</label>
        <input type="password" id="confirmarSenha" placeholder="Repita a nova senha">

        <span class="mensagem erro" id="erroSenha">As senhas não coincidem.</span>

        <button onclick="redefinirSenha()">Redefinir senha</button>
        <button class="voltar" onclick="voltarPasso(2)">Voltar</button>
    </div>

    <p class="sucesso" id="msgSucesso">
        ✔ Senha redefinida com sucesso! Você já pode fazer login.
    </p>
</div>

<!-- Projeto feito por Christian Silva, curso de ADS Uninter. -->

<script>

    // O código irá ser gerado aleatoriamente para simular o que seria enviado via e-mail
    var codigoGerado = "";

    function verificarEmail() {

        var email = document.getElementById("email").value;
        var erro = document.getElementById("erroEmail");

        if (email == "" || !email.includes("@") || !email.includes(".")) {
            erro.style.display = "block";
            return;
        }

        erro.style.display = "none";

        codigoGerado = "";

        for (var i = 0; i < 6; i++) {
            codigoGerado += Math.floor(Math.random() * 10);
        }

        alert(
            "Código enviado para: " +
            email +
            "\n\n(Simulação) Seu código é: " +
            codigoGerado
        );

        irParaPasso(2);
    }

    function verificarCodigo() {

        var digitado = document.getElementById("codigo").value;
        var erro = document.getElementById("erroCodigo");

        if (digitado !== codigoGerado) {
            erro.style.display = "block";
            return;
        }

        erro.style.display = "none";

        irParaPasso(3);
    }

    // muda quais passos a seguir estão visíveis na tela
    function irParaPasso(numero) {

        var passos = document.querySelectorAll(".passo");

        for (var i = 0; i < passos.length; i++) {
            passos[i].classList.remove("ativo");
        }

        document
            .getElementById("passo" + numero)
            .classList.add("ativo");

        document.getElementById("texto-passo").innerText =
            "Passo " +
            numero +
            " de 3 — " +
            textoDosPasso(numero);
    }

    function textoDosPasso(n) {

        if (n == 1) return "Informe seu e-mail";
        if (n == 2) return "Verifique o código";
        if (n == 3) return "Crie uma nova senha";
    }

    function voltarPasso(numero) {
        irParaPasso(numero);
    }

    function verificarForca() {

        var senha = document.getElementById("novaSenha").value;
        var barra = document.getElementById("forcaBarra");

        var forca = 0;

        if (senha.length >= 6) forca++;
        if (senha.length >= 10) forca++;
        if (/[A-Z]/.test(senha)) forca++;
        if (/[0-9]/.test(senha)) forca++;
        if (/[^a-zA-Z0-9]/.test(senha)) forca++;

        if (forca <= 1) {

            barra.style.width = "25%";
            barra.style.backgroundColor = "red";

        } else if (forca == 2 || forca == 3) {

            barra.style.width = "60%";
            barra.style.backgroundColor = "orange";

        } else {

            barra.style.width = "100%";
            barra.style.backgroundColor = "green";
        }
    }

    function redefinirSenha() {

        var nova = document.getElementById("novaSenha").value;
        var confirma = document.getElementById("confirmarSenha").value;
        var erro = document.getElementById("erroSenha");

        if (nova.length < 6) {

            erro.innerText =
                "A senha precisa ter pelo menos 6 caracteres.";

            erro.style.display = "block";

            return;
        }

        if (nova !== confirma) {

            erro.innerText = "As senhas não coincidem.";
            erro.style.display = "block";

            return;
        }

        erro.style.display = "none";

        var passos = document.querySelectorAll(".passo");

        for (var i = 0; i < passos.length; i++) {
            passos[i].style.display = "none";
        }

        document.getElementById("texto-passo").style.display = "none";

        document.getElementById("msgSucesso").style.display = "block";
    }

</script>

</body>
</html>
